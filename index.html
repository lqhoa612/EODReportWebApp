<!DOCTYPE html>
<html lang="en">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<head>
    <meta charset="UTF-8">
    <title>EOD Report</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="container">
        <h1>End of Day Report</h1>

        <!-- DATE -->
        <label>Date:</label>
        <input type="date" inputmode="decimal" pattern="[0-9]*"  id="date">

        <h2>Sales</h2>

        <div class="row">
            <label>Cash Sale</label>
            <input type="number" inputmode="decimal" pattern="[0-9]*"id="cashSale">
            <span></span>
        </div>

        <div class="row">
            <label>Cashout (-)</label>
            <input type="number" inputmode="decimal" pattern="[0-9]*" id="cashout">
            <span></span>
        </div>

        <div class="row">
            <label>Refund (-)</label>
            <input type="number" inputmode="decimal" pattern="[0-9]*" id="refund">
            <span></span>
        </div>

        <div class="row">
            <label>Cash Taken</label>
            <input type="number" inputmode="decimal" pattern="[0-9]*" id="cashTaken">
            <span></span>
        </div>

        <div class="row">
            <label>Card EFT</label>
            <input type="number" inputmode="decimal" pattern="[0-9]*" id="eft">
            <span></span>
        </div>

        <div class="row">
            <label>Card Online</label>
            <input type="number" inputmode="decimal" pattern="[0-9]*" id="online">
            <span></span>
        </div>

        <div class="row">
            <label>Kiosk</label>
            <input type="number" inputmode="decimal" pattern="[0-9]*" id="kiosk">
            <span></span>
        </div>

        <div class="row">
            <label>DoorDash</label>
            <input type="number" inputmode="decimal" pattern="[0-9]*" id="doordash">
            <span></span>
        </div>

        <div class="row">
            <label>Uber Eats</label>
            <input type="number" inputmode="decimal" pattern="[0-9]*" id="uber">
            <span></span>
        </div>

        <div class="total sticky-total">
            <span>Total Sale</span>
            <span id="totalSale">0.00</span>
        </div>

        <hr>

        <h2>Cash in Till</h2>

        <div class="row">
            <label>$50 times</label>
            <input type="number" inputmode="decimal" pattern="[0-9]*" class="cashCount" data-value="50">
            <span class="lineTotal">0</span>
        </div>

        <div class="row">
            <label>$20 times</label>
            <input type="number" inputmode="decimal" pattern="[0-9]*" class="cashCount" data-value="20">
            <span class="lineTotal">0</span>
        </div>

        <div class="row">
            <label>$10 times</label>
            <input type="number" inputmode="decimal" pattern="[0-9]*" class="cashCount" data-value="10">
            <span class="lineTotal">0</span>
        </div>

        <div class="row">
            <label>$5 times</label>
            <input type="number" inputmode="decimal" pattern="[0-9]*" class="cashCount" data-value="5">
            <span class="lineTotal">0</span>
        </div>

        <div class="row">
            <label>$2 times</label>
            <input type="number" inputmode="decimal" pattern="[0-9]*" class="cashCount" data-value="2">
            <span class="lineTotal">0</span>
        </div>

        <div class="row">
            <label>$1 times</label>
            <input type="number" inputmode="decimal" pattern="[0-9]*" class="cashCount" data-value="1">
            <span class="lineTotal">0</span>
        </div>

        <div class="total sticky-total">
            <span>Total Cash</span>
            <span id="cashTotal">0.00</span>
        </div>

    </div>
    <script src="js/app.js"></script>
</body>

</html>
